# llama.cpp Orchestrator - Server Block Configuration
# Place this file in /etc/nginx/sites-enabled/
#
# This file will be included by /etc/nginx/nginx.conf (http block)

# Upstream: llama.cpp servers
upstream llama_backend {
    # Load balancing method: least_conn (routes to server with fewest active connections)
    least_conn;
    
    # Backend servers (7 instances)
    server 127.0.0.1:8110 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8111 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8112 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8113 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8114 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8115 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8116 weight=1 max_fails=3 fail_timeout=30s;
    
    # Keepalive connections
    keepalive 32;
}

# Server: Unified entry point
server {
    listen 18081;
    server_name _;

    # Client settings
    client_max_body_size 100M;
    
    # Proxy timeouts (important for long-running LLM inference)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 300s;
    
    # Buffer settings
    proxy_buffer_size 128k;
    proxy_buffers 4 128k;
    proxy_busy_buffers_size 256k;

    # Main proxy location
    location / {
        proxy_pass http://llama_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Connection header for keepalive
        proxy_set_header Connection "";
        
        # Disable buffering for streaming responses (SSE support)
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    # Health check endpoint
    location /nginx-health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Status endpoint (for monitoring)
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
