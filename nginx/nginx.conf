# llama.cpp Orchestrator Nginx Configuration
# Generated by llama.cpp Dashboard
# 
# Usage:
#   1. Copy this file to /etc/nginx/sites-available/llama-orchestrator
#   2. Create symlink: sudo ln -s /etc/nginx/sites-available/llama-orchestrator /etc/nginx/sites-enabled/
#   3. Test config: sudo nginx -t
#   4. Reload: sudo systemctl reload nginx

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream: llama.cpp servers
    upstream llama_backend {
        # Load balancing method: least_conn (routes to server with fewest active connections)
        least_conn;
        
        # Backend servers
        server 127.0.0.1:8110 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8111 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8112 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8113 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8114 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8115 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:8116 weight=1 max_fails=3 fail_timeout=30s;
        
        # Keepalive connections
        keepalive 32;
    }

    # Server: Unified entry point
    server {
        listen 18081;
        server_name _;

        # Client settings
        client_max_body_size 100M;
        
        # Proxy timeouts (important for long-running LLM inference)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;
        
        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 128k;
        proxy_busy_buffers_size 256k;

        # Main proxy location
        location / {
            proxy_pass http://llama_backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Connection header for keepalive
            proxy_set_header Connection "";
            
            # Disable buffering for streaming responses
            proxy_buffering off;
            proxy_cache off;
            
            # SSE (Server-Sent Events) support for streaming
            proxy_set_header X-Accel-Buffering no;
        }

        # Health check endpoint
        location /nginx-health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Status endpoint (optional, for monitoring)
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}
